<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Aliza ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  overflow-x: hidden;
}

h1 {
  margin-top: 80px;
  font-size: 50px;
}

p {
  font-size: 22px;
}

button {
  margin: 15px;
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* Floating Hearts */
.heart {
  position: absolute;
  bottom: -20px;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

.hidden-message {
  display: none;
  margin-top: 20px;
  font-size: 20px;
}
</style>
</head>

<body>

<h1>Happy Birthday Aliza 🎂❤️</h1>
<p>Today is all about you ✨</p>
<p>The most beautiful soul in my life 💕</p>

<button onclick="showLove()">💌 Open First Surprise</button>
<button onclick="showSecret()">🎁 Open Second Surprise</button>
<button onclick="showFinal()">💖 Final Surprise</button>

<div id="message1" class="hidden-message">
You are my peace, my happiness, my everything ❤️
</div>

<div id="message2" class="hidden-message">
No matter what happens, I will always choose you 💍
</div>

<div id="message3" class="hidden-message">
I am so lucky that the world gave me YOU on this day ✨  
Forever yours, Umar ❤️
</div>

<script>

function showLove() {
  document.getElementById("message1").style.display = "block";
}

function showSecret() {
  document.getElementById("message2").style.display = "block";
}

function showFinal() {
  document.getElementById("message3").style.display = "block";
}

/* Floating Hearts */
function createHeart() {
  var heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 15 + "px";
  heart.style.animationDuration = Math.random() * 3 + 3 + "s";
  document.body.appendChild(heart);

  setTimeout(() => { heart.remove(); }, 6000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
